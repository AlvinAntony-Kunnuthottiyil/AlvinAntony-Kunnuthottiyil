<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 280"
  width="1200"
  height="280"
>
  <style>
    .vehicle {
      animation: drive 6s linear infinite;
    }

    .wheel {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 0.8s linear infinite;
    }

    .headlight {
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes drive {
      from {
        transform: translateX(0px);
      }

      to {
        transform: translateX(750px);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes glow {
      from {
        opacity: 0.7;
      }

      to {
        opacity: 1;
      }
    }
  </style>

  <!-- ROAD -->

  <line
    x1="0"
    y1="235"
    x2="1200"
    y2="235"
    stroke="#30363d"
    stroke-width="4"
  />

  <!-- MOVING VEHICLE -->

  <g class="vehicle">

    <!-- SHADOW -->

    <ellipse
      cx="235"
      cy="235"
      rx="205"
      ry="15"
      fill="#000000"
      opacity="0.35"
    />

    <!-- MAIN BODY -->

    <path
      d="
        M35 185
        L50 110
        Q55 75 95 70
        L295 65
        Q330 65 355 95
        L400 145
        Q425 150 440 175
        L445 205
        L30 205
        Z
      "
      fill="#1f2328"
      stroke="#8b949e"
      stroke-width="4"
    />

    <!-- ROOF -->

    <path
      d="
        M75 110
        L90 80
        L290 75
        Q320 75 340 100
        L365 125
        L70 125
        Z
      "
      fill="#161b22"
    />

    <!-- REAR WINDOW -->

    <path
      d="
        M95 85
        L165 82
        L165 120
        L82 120
        Z
      "
      fill="#57606a"
    />

    <!-- MIDDLE WINDOW -->

    <path
      d="
        M175 82
        L250 80
        L250 120
        L175 120
        Z
      "
      fill="#57606a"
    />

    <!-- FRONT WINDOW -->

    <path
      d="
        M260 80
        L290 80
        Q310 82 330 105
        L345 120
        L260 120
        Z
      "
      fill="#57606a"
    />

    <!-- WINDOW DIVIDERS -->

    <rect
      x="165"
      y="78"
      width="10"
      height="48"
      fill="#1f2328"
    />

    <rect
      x="250"
      y="78"
      width="10"
      height="48"
      fill="#1f2328"
    />

    <!-- DOOR LINES -->

    <line
      x1="165"
      y1="130"
      x2="165"
      y2="195"
      stroke="#484f58"
      stroke-width="3"
    />

    <line
      x1="255"
      y1="130"
      x2="255"
      y2="195"
      stroke="#484f58"
      stroke-width="3"
    />

    <!-- DOOR HANDLES -->

    <rect
      x="130"
      y="140"
      width="20"
      height="5"
      rx="2"
      fill="#8b949e"
    />

    <rect
      x="220"
      y="140"
      width="20"
      height="5"
      rx="2"
      fill="#8b949e"
    />

    <!-- BONNET -->

    <path
      d="
        M345 130
        L405 150
        L425 175
        L350 175
        Z
      "
      fill="#2d333b"
    />

    <!-- FRONT GRILLE -->

    <rect
      x="385"
      y="165"
      width="50"
      height="25"
      rx="5"
      fill="#0d1117"
    />

    <!-- GRILLE DETAILS -->

    <line
      x1="395"
      y1="170"
      x2="395"
      y2="185"
      stroke="#57606a"
      stroke-width="3"
    />

    <line
      x1="405"
      y1="170"
      x2="405"
      y2="185"
      stroke="#57606a"
      stroke-width="3"
    />

    <line
      x1="415"
      y1="170"
      x2="415"
      y2="185"
      stroke="#57606a"
      stroke-width="3"
    />

    <!-- HEADLIGHT -->

    <circle
      class="headlight"
      cx="395"
      cy="145"
      r="15"
      fill="#ffffff"
    />

    <circle
      cx="395"
      cy="145"
      r="9"
      fill="#58a6ff"
    />

    <!-- FRONT BUMPER -->

    <rect
      x="375"
      y="195"
      width="65"
      height="10"
      rx="4"
      fill="#57606a"
    />

    <!-- REAR BUMPER -->

    <rect
      x="30"
      y="195"
      width="55"
      height="10"
      rx="4"
      fill="#57606a"
    />

    <!-- REAR WHEEL -->

    <g class="wheel">

      <circle
        cx="115"
        cy="200"
        r="45"
        fill="#0d1117"
      />

      <circle
        cx="115"
        cy="200"
        r="29"
        fill="#57606a"
      />

      <circle
        cx="115"
        cy="200"
        r="9"
        fill="#8b949e"
      />

      <line
        x1="115"
        y1="175"
        x2="115"
        y2="225"
        stroke="#8b949e"
        stroke-width="5"
      />

      <line
        x1="90"
        y1="200"
        x2="140"
        y2="200"
        stroke="#8b949e"
        stroke-width="5"
      />

      <line
        x1="97"
        y1="182"
        x2="133"
        y2="218"
        stroke="#8b949e"
        stroke-width="5"
      />

      <line
        x1="133"
        y1="182"
        x2="97"
        y2="218"
        stroke="#8b949e"
        stroke-width="5"
      />

    </g>

    <!-- FRONT WHEEL -->

    <g class="wheel">

      <circle
        cx="340"
        cy="200"
        r="45"
        fill="#0d1117"
      />

      <circle
        cx="340"
        cy="200"
        r="29"
        fill="#57606a"
      />

      <circle
        cx="340"
        cy="200"
        r="9"
        fill="#8b949e"
      />

      <line
        x1="340"
        y1="175"
        x2="340"
        y2="225"
        stroke="#8b949e"
        stroke-width="5"
      />

      <line
        x1="315"
        y1="200"
        x2="365"
        y2="200"
        stroke="#8b949e"
        stroke-width="5"
      />

      <line
        x1="322"
        y1="182"
        x2="358"
        y2="218"
        stroke="#8b949e"
        stroke-width="5"
      />

      <line
        x1="358"
        y1="182"
        x2="322"
        y2="218"
        stroke="#8b949e"
        stroke-width="5"
      />

    </g>

    <!-- SIDE STEP -->

    <rect
      x="150"
      y="205"
      width="145"
      height="8"
      rx="4"
      fill="#57606a"
    />

  </g>

</svg>
