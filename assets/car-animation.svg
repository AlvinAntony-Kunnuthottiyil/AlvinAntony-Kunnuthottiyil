<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 250"
  width="1200"
  height="250"
>
  <style>
    .car {
      animation: drive 8s linear infinite;
    }

    .wheel {
      transform-box: fill-box;
      transform-origin: center;
      animation: rotateWheel 1s linear infinite;
    }

    @keyframes drive {
      0% {
        transform: translateX(-400px);
      }

      100% {
        transform: translateX(1300px);
      }
    }

    @keyframes rotateWheel {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <!-- Road -->
  <line
    x1="0"
    y1="210"
    x2="1200"
    y2="210"
    stroke="#30363d"
    stroke-width="4"
  />

  <!-- Moving Car -->
  <g class="car">

    <!-- Shadow -->
    <ellipse
      cx="200"
      cy="205"
      rx="170"
      ry="15"
      fill="#000000"
      opacity="0.35"
    />

    <!-- Main Body -->
    <path
      d="
        M40 165
        L55 105
        Q60 80 90 75
        L245 65
        Q275 65 295 90
        L340 145
        Q355 150 360 170
        L360 185
        L35 185
        Z
      "
      fill="#202428"
      stroke="#8b949e"
      stroke-width="3"
    />

    <!-- Roof -->
    <path
      d="
        M80 105
        L95 78
        L235 72
        Q260 72 280 100
        L290 110
        Z
      "
      fill="#161b22"
    />

    <!-- Front Window -->
    <path
      d="
        M220 82
        L250 82
        Q260 85 275 105
        L285 120
        L220 120
        Z
      "
      fill="#6e7681"
      opacity="0.65"
    />

    <!-- Rear Window -->
    <path
      d="
        M105 85
        L200 82
        L200 120
        L90 120
        Z
      "
      fill="#6e7681"
      opacity="0.65"
    />

    <!-- Window Divider -->
    <rect
      x="200"
      y="80"
      width="10"
      height="45"
      fill="#202428"
    />

    <!-- Hood -->
    <path
      d="
        M290 125
        L340 145
        L300 150
        Z
      "
      fill="#30363d"
    />

    <!-- Front Grille -->
    <rect
      x="305"
      y="150"
      width="50"
      height="20"
      rx="4"
      fill="#0d1117"
    />

    <!-- Grille Details -->
    <line
      x1="315"
      y1="153"
      x2="315"
      y2="167"
      stroke="#484f58"
      stroke-width="3"
    />

    <line
      x1="325"
      y1="153"
      x2="325"
      y2="167"
      stroke="#484f58"
      stroke-width="3"
    />

    <line
      x1="335"
      y1="153"
      x2="335"
      y2="167"
      stroke="#484f58"
      stroke-width="3"
    />

    <!-- Headlight -->
    <circle
      cx="330"
      cy="135"
      r="12"
      fill="#ffffff"
    />

    <circle
      cx="330"
      cy="135"
      r="7"
      fill="#58a6ff"
    />

    <!-- Door Lines -->
    <line
      x1="150"
      y1="125"
      x2="150"
      y2="175"
      stroke="#484f58"
      stroke-width="2"
    />

    <line
      x1="220"
      y1="125"
      x2="220"
      y2="175"
      stroke="#484f58"
      stroke-width="2"
    />

    <!-- Door Handles -->
    <rect
      x="125"
      y="135"
      width="18"
      height="4"
      rx="2"
      fill="#8b949e"
    />

    <rect
      x="190"
      y="135"
      width="18"
      height="4"
      rx="2"
      fill="#8b949e"
    />

    <!-- Rear Wheel -->
    <g class="wheel">

      <circle
        cx="105"
        cy="180"
        r="38"
        fill="#0d1117"
      />

      <circle
        cx="105"
        cy="180"
        r="24"
        fill="#484f58"
      />

      <circle
        cx="105"
        cy="180"
        r="8"
        fill="#8b949e"
      />

      <line
        x1="105"
        y1="158"
        x2="105"
        y2="202"
        stroke="#8b949e"
        stroke-width="4"
      />

      <line
        x1="83"
        y1="180"
        x2="127"
        y2="180"
        stroke="#8b949e"
        stroke-width="4"
      />

    </g>

    <!-- Front Wheel -->
    <g class="wheel">

      <circle
        cx="285"
        cy="180"
        r="38"
        fill="#0d1117"
      />

      <circle
        cx="285"
        cy="180"
        r="24"
        fill="#484f58"
      />

      <circle
        cx="285"
        cy="180"
        r="8"
        fill="#8b949e"
      />

      <line
        x1="285"
        y1="158"
        x2="285"
        y2="202"
        stroke="#8b949e"
        stroke-width="4"
      />

      <line
        x1="263"
        y1="180"
        x2="307"
        y2="180"
        stroke="#8b949e"
        stroke-width="4"
      />

    </g>

  </g>

</svg>
